# ---------------------------------------------------------------------
#  _config.yml  –  Configurazione principale del sito Jekyll
#  Tema: mmistakes/minimal-mistakes
#  Repository: https://github.com/robertochello/robertochello.github.io
# ---------------------------------------------------------------------

compress_html:
  clippings: all
  ignore:
    envs: development

name: "Roberto Chello"
title: "Roberto Chello"
title_separator: "|"
subtitle: "PLC & Automation Engineer"
email: "robertochello@gmail.com"
url: "https://robertochello.github.io"
baseurl: ""
repository: "robertochello/robertochello.github.io"
description: >-
  Portfolio of Roberto Chello, PLC & Automation Engineer focused on industrial automation, motion control, robotics, control systems, and structured technical documentation.
github_username: "robertochello"
minimal_mistakes_skin: "dark"
search: true
locale: "en-US"
breadcrumb: false

markdown: kramdown
remote_theme: "mmistakes/minimal-mistakes"
permalink: "/:categories/:title/"
paginate: 5
paginate_path: "/page:num/"
timezone: "Europe/Rome"

include:
  - _pages

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor/bundle/
  - vendor/cache/
  - vendor/gems/
  - vendor/ruby/
  - README.md

plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name: "Roberto Chello"
  avatar: "/assets/images/Photo_CV.jpg"
  bio: "PLC Software Engineer turning industrial complexity into structured automation logic, diagnostics and documentation."
  location: "Italy"
  links:
    - label: "Contact"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:robertochello@gmail.com"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/robertochello"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/robertochello"
    - label: "Download CV"
      icon: "fas fa-fw fa-file-pdf"
      url: "/assets/cv/RobertoChello_CV_EN.pdf"

footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/robertochello"
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/robertochello"

collections:
  repositories:
    output: true
    permalink: "/:collection/:path/"

defaults:
  - scope:
      path: "index.html"
    values:
      author_profile: true
      header:
        overlay_image: "/assets/images/header.png"
        overlay_filter: 0.55

  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
      header:
        overlay_image: "/assets/images/header.png"
        overlay_filter: 0.55

  - scope:
      path: ""
      type: repositories
    values:
      layout: repository
      author_profile: false
      share: true
      header:
        teaser: "/assets/images/header.png"

category_archive:
  type: liquid
  path: /categories/

tag_archive:
  type: liquid
  path: /tags/

repositories_archive:
  type: liquid
  path: /repositories/
